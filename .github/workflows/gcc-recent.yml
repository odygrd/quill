name: gcc-recent

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scripts/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scripts/**'

jobs:
  build:
    name: GCC ${{ matrix.gcc_version }} ${{ matrix.build_type }} C++${{ matrix.std }}
    runs-on: ubuntu-latest
    container:
      image: gcc:${{ matrix.gcc_version }}
    strategy:
      fail-fast: false
      matrix:
        gcc_version: [ "15.1", "16" ]
        cxx: [ g++ ]
        build_type: [ Debug, Release ]
        std: [ 23 ]
        with_tests: [ ON ]

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies and create build environment
        run: |
          apt-get update
          apt-get install -y cmake make
          mkdir -p ${{runner.workspace}}/build
          ls -l ${{runner.workspace}}

      - name: Configure
        env:
          CXX: ${{matrix.cxx}}
        run: |
          cd ${{runner.workspace}}/build
          cmake -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
                -DCMAKE_CXX_STANDARD=${{matrix.std}} -DQUILL_BUILD_TESTS=${{matrix.with_tests}} \
                -DQUILL_BUILD_EXAMPLES=ON -DQUILL_VERBOSE_MAKEFILE=ON $GITHUB_WORKSPACE

      - name: Build
        run: |
          cd ${{runner.workspace}}/build
          cmake --build . --config ${{ matrix.build_type }} --parallel $(nproc)

      - name: Test
        run: |
          cd ${{runner.workspace}}/build
          ctest --build-config ${{ matrix.build_type }} --parallel $(nproc) --output-on-failure
        env:
          CTEST_OUTPUT_ON_FAILURE: True
